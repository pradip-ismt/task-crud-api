apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-api-deployment

spec:
  replicas: 4
  selector:
    matchLabels:
      app: task-api

  template:
    metadata:
      labels:
        app: task-api

    spec:
      containers:
        - name: task-api
          image: task-api:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8000